name: Tests

# Re-added per TODO.md. Requires a `UNITY_LICENSE` repository secret (a Unity Personal/Plus/Pro
# license file activated via game-ci/unity-request-activation-file, see
# https://game.ci/docs/github/activation) or it fails at the activation step before any test runs.
# UNITY_EMAIL / UNITY_PASSWORD are only needed alongside UNITY_LICENSE for serial-based activation;
# omit them if using a manually-generated .ulf license file secret instead.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  editmode-tests:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: EditMode
          artifactsPath: editmode-artifacts
          coverageOptions: generateAdditionalMetrics;generateHtmlReport;generateBadgeReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EditMode-test-results
          path: ${{ steps.tests.outputs.artifactsPath }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EditMode-coverage-report
          path: ${{ steps.tests.outputs.coveragePath }}

  # PlayMode drives a real controller - live PlayableGraph, real searches, real transitions - on a
  # synthetic database. EditMode alone proves the maths; only this proves the runtime loop actually
  # runs. A green EditMode badge over untested runtime code is the reassurance an Asset Store buyer
  # should not be sold.
  playmode-tests:
    name: PlayMode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run PlayMode tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: PlayMode
          artifactsPath: playmode-artifacts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PlayMode-test-results
          path: ${{ steps.tests.outputs.artifactsPath }}
